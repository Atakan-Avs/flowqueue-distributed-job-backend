services:
  api:
    build: .
    container_name: flowqueue_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - prometheus_data:/tmp/prometheus
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus
    depends_on:
      - postgres
      - redis
      - kafka

  worker:
    build: .
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info -E -Q high,normal,low
    volumes:
      - .:/app
      - prometheus_data:/tmp/prometheus
    env_file:
      - .env
    environment:
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus
    depends_on:
      - postgres
      - redis

  flower:
    build: .
    container_name: flowqueue_flower
    command: celery -A app.core.celery_app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - worker

  prometheus:
    image: prom/prometheus:latest
    container_name: flowqueue_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: flowqueue_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  beat:
    build: .
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    volumes:
      - .:/app
      - prometheus_data:/tmp/prometheus
    env_file:
      - .env
    environment:
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus
    depends_on:
      - redis
      - worker

  postgres:
    image: postgres:17
    container_name: flowqueue_postgres
    environment:
      POSTGRES_DB: flowqueue_db
      POSTGRES_USER: flowqueue_user
      POSTGRES_PASSWORD: flowqueue_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: flowqueue_redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:4.1.2
    container_name: flowqueue_kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  postgres_data:
  grafana_data:
  kafka_data:
  prometheus_data: