services:
  api:
    build: .
    container_name: flowqueue_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: flowqueue_worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  flower:
    build: .
    container_name: flowqueue_flower
    command: celery -A app.core.celery_app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - worker

  postgres:
    image: postgres:17
    container_name: flowqueue_postgres
    environment:
      POSTGRES_DB: flowqueue_db
      POSTGRES_USER: flowqueue_user
      POSTGRES_PASSWORD: flowqueue_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: flowqueue_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: